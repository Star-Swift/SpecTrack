    DATASETS_NAME:
    - HOT2022
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 100000
  USE_NLP:
    TNL2K: True
MODEL:
  ENCODER:
    TYPE: fastitpnl
    STRIDE: 16
    PRETRAIN_TYPE: 'pretrained/itpn/fast_itpn_large_1600e_1k.pt' # This parameter is not activated for now.
    PATCHEMBED_INIT: halfcopy
    # copy: copy the weights from the pretrained model
    # halfcopy: copy the weights from the pretrained model for patch embedding and initialize the others
    # random: initialize all the weights randomly
    # insert: insert the pretrained weights into the model channels
    # insert_halfcopy: insert the pretrained weights into the model channels and initialize the others
    DROP_PATH: 0.1
    TOKEN_TYPE_INDICATE: True
    USE_MOCE: True          # 启用MoCE
    MOCE_RANK: 32           # 专家内部降维维度
    MOCE_NUM_EXPERTS: 4     # 专家数量
    MOCE_TOP_K: 2           # 每次激活的专家数
    MOCE_START_LAYER: 7    # 从第几层开始使用MoCE（Stage3内）
  TEXT_ENCODER:
    TYPE: ViT-L/14
  DECODER:
    TYPE: CENTER
    NUM_CHANNELS: 256
    CONV_TYPE: normal
    XAVIER_INIT: True
  TASK_DECODER:
    NUM_CHANNELS: 256
    FEATURE_TYPE: average
  TASK_NUM: 1
  TASK_INDEX:
    HOT2022: 0
TRAIN:
  TYPE: text_frozen
  ENCODER_MULTIPLIER: 0.1
  BATCH_SIZE: 32
  EPOCH: 10
  GRAD_CLIP_NORM: 0.1
  LR: 0.0001
  LR_DROP_EPOCH: 144
  NUM_WORKER: 20
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  WEIGHT_DECAY: 0.0001
  MOCE_AUX_WEIGHT: 0.01  # MoCE辅助损失权重
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  CE_WEIGHT: 1.0
  TASK_CE_WEIGHT: 1.0
TEST:
  EPOCH: 10
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 224
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 112
  WINDOW: True
  NUM_TEMPLATES: 2
  UPDATE_INTERVALS:
    DEFAULT: 25
  UPDATE_THRESHOLD:
    DEFAULT: 0.70
  MULTI_MODAL_VISION:
    DEFAULT: True
  MULTI_MODAL_LANGUAGE:
    DEFAULT: True
  USE_NLP:
    DEFAULT: False
    TNL2K: True

